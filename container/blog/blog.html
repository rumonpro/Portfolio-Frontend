<section class="blog-module" id="blog">
    <div class="blog-container">
        <!-- Header -->
        <header class="blog-header">
            <h1 class="blog-title">My Blog</h1>
            <p class="blog-subtitle">Technical articles and practical guides focused on web development, cybersecurity, SEO, and digital innovation.</p>
        </header>

        <!-- Slider Wrapper -->
        <div class="blog-slider-wrapper">
            <div class="blog-slider" id="blogGrid">
                <!-- Blog cards will be loaded here dynamically -->
                <div class="blog-loading">Loading blogs...</div>
            </div>
        </div>

        <!-- Navigation Arrows Below -->
        <div class="blog-navigation">
            <button class="blog-arrow blog-arrow-prev" id="prevBtn" aria-label="Previous">
                <i class="fas fa-chevron-left"></i>
            </button>
            <div class="blog-dots" id="blogDots">
                <!-- Dots will be generated here -->
            </div>
            <button class="blog-arrow blog-arrow-next" id="nextBtn" aria-label="Next">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</section>
