<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | Rumon</title>
    <link rel="icon" type="image/png" href="Assets/fav icon.png">
    
    <!-- External Resources -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Component CSS -->
    <link rel="stylesheet" href="container/header/header.css">
    <link rel="stylesheet" href="container/footer/footer.css">
    <link rel="stylesheet" href="container/portfolio/portfolio.css">
    
    <style>
        :root {
            --fs-section-title: clamp(2rem, 1.6vw + 1.6rem, 2.75rem);
            --fs-section-subtitle: clamp(1rem, 0.35vw + 0.92rem, 1.125rem);
            --fs-card-title: clamp(1.15rem, 0.4vw + 1.05rem, 1.35rem);
            --fs-body-sm: clamp(0.9rem, 0.2vw + 0.85rem, 1rem);
        }

        body {
            background-color: #0b0c16;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }

        .page-header {
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=1600');
            background-size: cover;
            background-position: center;
            padding: 120px 0 80px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .page-header h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: var(--fs-section-title);
            font-weight: 800;
            margin-bottom: 20px;
        }

        .breadcrumbs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            color: #a4a5b6;
            font-size: 14px;
        }

        .breadcrumbs a {
            color: #b057d5;
            text-decoration: none;
            transition: color 0.3s;
        }

        .breadcrumbs a:hover {
            color: #ff8453;
        }

        .portfolio-main {
            padding: 100px 0;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        @media (max-width: 1024px) {
            .portfolio-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Custom Cursor */
        .cursor-dot, .cursor-outline {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            pointer-events: none;
        }
        .cursor-dot { width: 8px; height: 8px; background-color: #b057d5; }
        .cursor-outline { width: 40px; height: 40px; border: 2px solid rgba(176, 87, 213, 0.5); transition: left 0.15s, top 0.15s; }
        body, a, button { cursor: none !important; }
    </style>
</head>

<body>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <div id="header-container"></div>

    <section class="page-header">
        <div class="container">
            <h1>All Projects</h1>
            <div class="breadcrumbs">
                <a href="Index.html">Home</a>
                <span>/</span>
                <span>Portfolio</span>
            </div>
        </div>
    </section>

    <main class="portfolio-main">
        <div class="portfolio-grid" id="portfolioGrid">
            <div class="portfolio-loading">Loading projects...</div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script>
        async function loadProjects() {
            const portfolioGrid = document.getElementById('portfolioGrid');
            try {
                const response = await fetch('https://backend-twze.vercel.app/api/projects');
                const projects = await response.json();
                
                if (projects.length === 0) {
                    portfolioGrid.innerHTML = '<div class="portfolio-error">No projects found.</div>';
                    return;
                }

                portfolioGrid.innerHTML = '';
                projects.forEach(project => {
                    const card = createPortfolioCard(project);
                    portfolioGrid.appendChild(card);
                });

                initParticles();
            } catch (error) {
                portfolioGrid.innerHTML = '<div class="portfolio-error">Error loading projects.</div>';
            }
        }

        function createPortfolioCard(project) {
            const card = document.createElement('div');
            card.className = 'portfolio-card';
            let imageUrl = project.image ? (project.image.startsWith('http') ? project.image : `https://backend-twze.vercel.app/${project.image}`) : './Assets/1.jpg';
            
            card.innerHTML = `
                <div class="card-image-box">
                    <img src="${imageUrl}" alt="${project.name}" onerror="this.src='./Assets/1.jpg'">
                </div>
                <div class="card-content-box">
                    <canvas class="portfolio-card-canvas" aria-hidden="true"></canvas>
                    <h3>${project.name}</h3>
                    <p>${project.description}</p>
                    <div class="project-links">
                        ${project.liveLink ? `<a href="${project.liveLink}" target="_blank" class="project-link"><i class="fas fa-external-link-alt"></i> Live Preview</a>` : ''}
                        ${project.githubLink ? `<a href="${project.githubLink}" target="_blank" class="project-link github-link"><i class="fab fa-github"></i> GitHub</a>` : ''}
                    </div>
                </div>
            `;
            return card;
        }

        function initParticles() {
            // Particle logic from portfolio.js
            const canvases = Array.from(document.querySelectorAll('.portfolio-card-canvas'));
            const colors = ['#b057d5', '#d45b98', '#ff8453'];
            const dpr = window.devicePixelRatio || 1;

            canvases.forEach(canvas => {
                const ctx = canvas.getContext('2d');
                const parent = canvas.parentElement;
                let particles = [];

                function resize() {
                    const rect = parent.getBoundingClientRect();
                    canvas.width = rect.width * dpr;
                    canvas.height = rect.height * dpr;
                    ctx.scale(dpr, dpr);
                }

                class Particle {
                    constructor() { this.reset(true); }
                    reset(isInit) {
                        this.x = Math.random() * parent.offsetWidth;
                        this.y = isInit ? Math.random() * parent.offsetHeight : parent.offsetHeight + 10;
                        this.vy = -(Math.random() * 0.3 + 0.1);
                        this.size = Math.random() * 2 + 0.5;
                        this.color = colors[Math.floor(Math.random() * colors.length)];
                    }
                    update() {
                        this.y += this.vy;
                        if (this.y < -10) this.reset(false);
                    }
                    draw() {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fillStyle = this.color;
                        ctx.fill();
                    }
                }

                resize();
                for (let i = 0; i < 15; i++) particles.push(new Particle());

                function animate() {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => { p.update(); p.draw(); });
                    requestAnimationFrame(animate);
                }
                animate();
            });
        }

        async function loadComponents() {
            const components = [
                { id: 'header-container', url: 'container/header/header.html', script: 'container/header/header.js' },
                { id: 'footer-container', url: 'container/footer/footer.html', script: 'container/footer/footer.js' }
            ];
            for (const comp of components) {
                const response = await fetch(comp.url);
                const html = await response.text();
                document.getElementById(comp.id).innerHTML = html;
                if (comp.script) {
                    const script = document.createElement('script');
                    script.src = comp.script;
                    document.body.appendChild(script);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadComponents();
            loadProjects();
        });

        // Cursor logic
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');
        window.addEventListener('mousemove', e => {
            cursorDot.style.left = cursorOutline.style.left = `${e.clientX}px`;
            cursorDot.style.top = cursorOutline.style.top = `${e.clientY}px`;
        });
    </script>
</body>

</html>
